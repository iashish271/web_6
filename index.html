<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Universe That Celebrates Talat</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Dancing+Script:wght@400;600;700&family=Quicksand:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Audio Element -->
    <audio id="bgMusic" loop preload="auto">
        <source src="images/romantic-music.mp3" type="audio/mpeg">
    </audio>

    <!-- Music Control Button -->
    <div id="musicControl" class="music-control">
        <span class="music-icon">&#9836;</span>
        <div class="music-waves">
            <span></span><span></span><span></span><span></span>
        </div>
    </div>

    <!-- Start Overlay -->
    <div id="startOverlay" class="start-overlay">
        <div class="start-content">
            <div class="start-stars"></div>
            <h1 class="start-title">The Universe That Celebrates<br><span class="highlight">Talat</span></h1>
            <p class="start-subtitle">A cosmic journey through the stars...</p>
            <button id="startBtn" class="start-btn">
                <span class="btn-text">Enter the Universe</span>
                <span class="btn-glow"></span>
            </button>
        </div>
    </div>

    <!-- Chapter 1: Before You Existed -->
    <section id="chapter1" class="chapter">
        <div class="chapter-bg" style="background-image: url('images/chapter1-bg.jpg')"></div>
        <canvas id="canvas1" class="chapter-canvas"></canvas>
        <div class="chapter-content">
            <div class="text-container" id="ch1-text1"></div>
            <div class="text-container" id="ch1-text2"></div>
            <div id="heartStar" class="heart-star">
                <svg viewBox="0 0 100 100" class="heart-svg">
                    <path class="heart-path" d="M50 85 C50 85, 10 55, 10 30 C10 15, 25 5, 50 20 C75 5, 90 15, 90 30 C90 55, 50 85, 50 85Z"/>
                </svg>
                <div class="heart-glow"></div>
            </div>
            <p class="tap-hint" id="ch1-hint">Tap the glowing heart</p>
        </div>
    </section>

    <!-- Chapter 2: A Star is Born -->
    <section id="chapter2" class="chapter">
        <div class="chapter-bg" style="background-image: url('images/chapter2-bg.jpg')"></div>
        <canvas id="canvas2" class="chapter-canvas"></canvas>
        <div class="nebula-overlay"></div>
        <div class="chapter-content">
            <div class="cosmic-explosion" id="cosmicExplosion"></div>
            <div class="text-container" id="ch2-text1"></div>
            <div class="star-reveal" id="starReveal">
                <div class="talat-star">
                    <span class="talat-name">TALAT</span>
                    <span class="heart-symbol">&#10084;</span>
                </div>
                <div class="star-rays"></div>
                <div class="star-glow"></div>
            </div>
            <div class="text-container" id="ch2-text2"></div>
        </div>
    </section>

    <!-- Chapter 3: The Universe Changes -->
    <section id="chapter3" class="chapter">
        <div class="chapter-bg" style="background-image: url('images/chapter3-bg.jpg')"></div>
        <canvas id="canvas3" class="chapter-canvas"></canvas>
        <div class="chapter-content">
            <div class="lonely-planet" id="lonelyPlanet"></div>
            <div class="text-container" id="ch3-text1"></div>
            <div class="flowers-container" id="flowersContainer"></div>
            <div class="butterflies-container" id="butterfliesContainer"></div>
            <div class="petals-container" id="petalsContainer"></div>
        </div>
    </section>

    <!-- Chapter 4: Constellation of Memories -->
    <section id="chapter4" class="chapter">
        <div class="chapter-bg" style="background-image: url('images/chapter4-bg.jpg')"></div>
        <canvas id="canvas4" class="chapter-canvas"></canvas>
        <div class="chapter-content">
            <div class="text-container" id="ch4-title"></div>
            <div class="constellation-container" id="constellationContainer"></div>
            <div class="text-container" id="ch4-subtitle"></div>
            <div class="memory-modal" id="memoryModal">
                <div class="memory-content">
                    <button class="memory-close" id="memoryClose">&times;</button>
                    <div class="memory-star-icon">&#10029;</div>
                    <div class="memory-text" id="memoryText"></div>
                    <div class="memory-glow"></div>
                </div>
            </div>
        </div>
    </section>

    <!-- Chapter 5: The Birthday Orbit -->
    <section id="chapter5" class="chapter">
        <div class="chapter-bg" style="background-image: url('images/chapter5-bg.jpg')"></div>
        <canvas id="canvas5" class="chapter-canvas"></canvas>
        <div class="chapter-content">
            <div class="orbit-system" id="orbitSystem">
                <div class="center-glow"></div>
                <div class="orbit orbit1"><div class="planet planet1"></div></div>
                <div class="orbit orbit2"><div class="planet planet2"></div></div>
                <div class="orbit orbit3"><div class="planet planet3"></div></div>
                <div class="orbit orbit4"><div class="planet planet4"></div></div>
                <div class="giant-planet" id="giantPlanet">
                    <span class="planet-number">19</span>
                </div>
            </div>
            <div class="celebration-container" id="celebrationContainer">
                <canvas id="fireworksCanvas"></canvas>
            </div>
            <div class="birthday-reveal" id="birthdayReveal">
                <div class="birthday-text" id="birthdayText1"></div>
                <div class="birthday-text" id="birthdayText2"></div>
            </div>
        </div>
    </section>

    <!-- Chapter 6: Message from the Stars -->
    <section id="chapter6" class="chapter">
        <div class="chapter-bg" style="background-image: url('images/chapter6-bg.jpg')"></div>
        <canvas id="canvas6" class="chapter-canvas"></canvas>
        <div class="chapter-content">
            <div class="text-container" id="ch6-text1"></div>
            <div class="envelope-container" id="envelopeContainer">
                <div class="envelope" id="envelope">
                    <div class="envelope-front">
                        <div class="envelope-flap"></div>
                        <div class="envelope-body">
                            <div class="envelope-heart">&#10084;</div>
                            <div class="envelope-stars">&#10022; &#10023; &#10022;</div>
                        </div>
                    </div>
                    <div class="envelope-back">
                        <div class="letter" id="letter">
                            <div class="letter-content" id="letterContent"></div>
                        </div>
                    </div>
                </div>
                <div class="envelope-glow"></div>
            </div>
            <div class="envelope-hint" id="envelopeHint">Tap the envelope to open</div>
        </div>
    </section>

    <!-- Chapter 7: Wishes Across the Galaxy -->
    <section id="chapter7" class="chapter">
        <div class="chapter-bg" style="background-image: url('images/chapter7-bg.jpg')"></div>
        <canvas id="canvas7" class="chapter-canvas"></canvas>
        <div class="aurora-overlay"></div>
        <div class="chapter-content">
            <div class="text-container" id="ch7-text1"></div>
            <div class="wishes-container" id="wishesContainer"></div>
            <div class="text-container" id="ch7-text2"></div>
        </div>
    </section>

    <!-- Chapter 8: The Galaxy of Love -->
    <section id="chapter8" class="chapter">
        <div class="chapter-bg" style="background-image: url('images/chapter8-bg.jpg')"></div>
        <canvas id="canvas8" class="chapter-canvas"></canvas>
        <div class="chapter-content">
            <div class="rotating-galaxy" id="rotatingGalaxy"></div>
            <div class="text-container" id="ch8-text1"></div>
            <div class="text-container" id="ch8-text2"></div>
            <div class="text-container" id="ch8-text3"></div>
        </div>
    </section>

    <!-- Final Chapter: The Cosmic Finale -->
    <section id="chapter9" class="chapter">
        <div class="chapter-bg" style="background-image: url('images/chapter9-bg.jpg')"></div>
        <canvas id="canvas9" class="chapter-canvas"></canvas>
        <div class="chapter-content">
            <div class="finale-zoom" id="finaleZoom">
                <div class="universe-view"></div>
            </div>
            <div class="constellation-talat" id="constellationTalat">
                <span class="finale-name">TALAT</span>
                <span class="finale-heart">&#10084;</span>
            </div>
            <div class="finale-messages" id="finaleMessages">
                <div class="finale-text" id="finaleText1"></div>
                <div class="finale-text" id="finaleText2"></div>
                <div class="finale-text" id="finaleText3"></div>
            </div>
            <div class="floating-hearts-container" id="floatingHearts"></div>
        </div>
    </section>

    <!-- Progress Indicator -->
    <div class="progress-bar" id="progressBar">
        <div class="progress-fill" id="progressFill"></div>
    </div>
    <div class="chapter-indicator" id="chapterIndicator">1 / 9</div>

    <!-- Transition Overlay -->
    <div class="transition-overlay" id="transitionOverlay"></div>

    <script src="script.js"></script>
</body>
</html>
